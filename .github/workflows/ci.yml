name: Build and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: "Build and Release"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: "Bump version"
        id: version
        run: |
          BASE=$(mvn --batch-mode -q help:evaluate -Dexpression=project.version -DforceStdout)
          BASE=${BASE%-SNAPSHOT}
          MAJOR_MINOR=${BASE%.*}
          VERSION="${MAJOR_MINOR}.${GITHUB_RUN_NUMBER}"
          mvn --batch-mode -q versions:set -DnewVersion="${VERSION}" -DgenerateBackupPoms=false
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
      - name: "Build plugin jar"
        run: mvn --batch-mode -DskipTests package
      - name: "Create release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: target/GriefPrevention.jar
